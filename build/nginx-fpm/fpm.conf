[www]
user = nginx
group = nginx

listen = /var/run/fpm.sock

; Set permissions for unix socket, if one is used. Default Values: user and group are set as the running user
listen.owner = nginx
listen.group = nginx

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

clear_env = no


php_admin_value[open_basedir] = /www/:/www/app/public:/tmp/:/usr/share/php/:/dev/urandom:/run/secrets/

php_admin_value[upload_max_filesize] = 256m
php_admin_value[post_max_size] = 256m
php_admin_value[memory_limit] = 512m



