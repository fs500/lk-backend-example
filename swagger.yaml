openapi: 3.0.0
info:
  title: 'Brown House API'
  contact:
    email: m@art.su
  version: 0.1.0
paths:
  '/api/calculator/{flatNumber}':
    get:
      tags:
        - Калькулятор
      summary: 'Ипотечный калькулятор квартиры'
      operationId: 'App\Controller\API\CalculatorController::index'
      parameters:
        -
          $ref: '#/components/parameters/flatNumber'
      responses:
        '200':
          description: 'Данные страницы ипотечного калькулятора квартиры'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MortgageCalculator'
  /api/common:
    get:
      tags:
        - Общее
      summary: 'Общие данные'
      operationId: 'App\Controller\API\CommonController::index'
      responses:
        '200':
          description: 'Общие данные по сайту'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Common'
  /api/flat/visual:
    get:
      tags:
        - Квартиры
      summary: 'Визуальный выбор квартиры'
      operationId: 'App\Controller\API\FlatController::visual'
      responses:
        '200':
          description: 'Данные страницы визуального выбора квартиры'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatVisual'
  /api/flat/parameters:
    get:
      tags:
        - Квартиры
      summary: 'Получение параметров для поиска квартиры'
      operationId: 'App\Controller\API\FlatController::parameters'
      responses:
        '200':
          description: 'Данные для формы подбора квартиры по параметрам'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatParameters'
  /api/flat/list:
    post:
      tags:
        - Квартиры
      summary: 'Список квартир по параметрам'
      parameters:
        -
          $ref: '#/components/parameters/rooms'
        -
          $ref: '#/components/parameters/priceMin'
        -
          $ref: '#/components/parameters/priceMax'
        -
          $ref: '#/components/parameters/areaMin'
        -
          $ref: '#/components/parameters/areaMax'
        -
          $ref: '#/components/parameters/floorMin'
        -
          $ref: '#/components/parameters/floorMax'
        -
          $ref: '#/components/parameters/sortField'
        -
          $ref: '#/components/parameters/sortOrder'
        -
          $ref: '#/components/parameters/statuses'
      responses:
        '200':
          description: 'Список квартир по параметрам'
          headers:
            X-Total-Count:
              description: 'Количество квартир в списке'
              schema:
                type: number
                format: integer
                example: 15
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatList'
  '/api/flat/floor/{floorNumber}':
    get:
      tags:
        - Квартиры
      summary: 'Получение страницы этажа'
      operationId: 'App\Controller\API\FlatController::floor'
      parameters:
        -
          $ref: '#/components/parameters/floorNumber'
      responses:
        '200':
          description: 'Данные страницы этажа'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatFloor'
  '/api/flat/{floorNumber}/{flatNumber}':
    get:
      tags:
        - Квартиры
      summary: 'Получение карточки квартиры'
      operationId: 'App\Controller\API\FlatController::card'
      parameters:
        -
          $ref: '#/components/parameters/floorNumber'
        -
          $ref: '#/components/parameters/flatNumber'
      responses:
        '200':
          description: 'Данные страницы карточки квартиры'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatCard'
  '/api/flat/{flatNumber}':
    get:
      tags:
        - Квартиры
      summary: 'Получение карточки квартиры'
      operationId: 'App\Controller\API\FlatController::single'
      parameters:
        -
          $ref: '#/components/parameters/flatNumber'
      responses:
        '200':
          description: 'Данные страницы карточки квартиры'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatCard'
  /api/menu:
    get:
      tags:
        - Меню
      summary: Меню
      operationId: 'App\Controller\API\MenuController::index'
      responses:
        '200':
          description: 'Данные меню сайта'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
  /api/metatag:
    get:
      tags:
        - Метатеги
      summary: 'Метатеги для страницы по запрошенному URI'
      operationId: 'App\Controller\API\MetatagController::search'
      parameters:
        -
          $ref: '#/components/parameters/metatag_uri'
      responses:
        '200':
          description: 'Метатеги запрошенной страницы'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metatag'
  /api/news:
    get:
      tags:
        - Новости
      summary: 'Список новостей'
      parameters:
        -
          $ref: '#/components/parameters/limit'
        -
          $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: 'Список новостей'
          headers:
            X-Total-Count:
              description: 'Общее количество новостей'
              schema:
                type: number
                format: integer
                example: 15
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsListItem'
  '/api/news/{path}':
    get:
      tags:
        - Новости
      summary: 'Одиночная новость со списком последних'
      operationId: 'App\Controller\API\NewsController::single'
      responses:
        '200':
          description: 'Одиночная новость со списком последних'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsSingle'
  /api/page/index:
    get:
      tags:
        - Страницы
      summary: 'Главная страница'
      operationId: 'App\Controller\API\PageController::index'
      responses:
        '200':
          description: 'Данные главной страницы сайта'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageIndex'
  /api/page/contacts:
    get:
      tags:
        - Страницы
      summary: Контакты
      operationId: 'App\Controller\API\PageController::contacts'
      responses:
        '200':
          description: 'Данные страницы контактов'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageContacts'
  /api/page/how_to_buy:
    get:
      tags:
        - Страницы
      summary: 'Как купить'
      operationId: 'App\Controller\API\PageController::howToBuy'
      responses:
        '200':
          description: 'Данные страницы ''Как Купить'''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageHowToBuy'
  /api/page/documents:
    get:
      tags:
        - Страницы
      summary: Документы
      operationId: 'App\Controller\API\PageController::documents'
      responses:
        '200':
          description: 'Данные страницы ''Документы'''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDocuments'
  /api/page/building_progress:
    get:
      tags:
        - Страницы
      summary: 'Ход строительства'
      operationId: 'App\Controller\API\PageController::buildingProgress'
      responses:
        '200':
          description: 'Данные страницы ''Ход строительства'''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBuildingProgress'
  /api/page/commerce:
    get:
      tags:
        - Страницы
      summary: Коммерция
      operationId: 'App\Controller\API\PageController::commerce'
      responses:
        '200':
          description: 'Данные страницы ''Коммерция'''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCommerce'
  /api/page/location:
    get:
      tags:
        - Страницы
      summary: 'Страница Расположение'
      operationId: 'App\Controller\API\PageController::location'
      responses:
        '200':
          description: 'Данные страницы Расположение'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageLocation'
components:
  schemas:
    Common:
      description: 'Class CommonView'
      properties:
        phone:
          $ref: '#/components/schemas/Phone'
        email:
          $ref: '#/components/schemas/Email'
        socialNetworks:
          type: array
          items:
            $ref: '#/components/schemas/SocialNetwork'
        scripts:
          $ref: '#/components/schemas/Scripts'
        legalText:
          description: 'Правовая информация в футере сайта'
          type: string
        notification:
          $ref: '#/components/schemas/Notification'
      type: object
    ContactsItem:
      description: 'Class ContactsOfficeView'
      properties:
        address:
          type: string
        route:
          $ref: '#/components/schemas/Link'
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        mapLatitude:
          type: number
          format: float
        mapLongitude:
          type: number
          format: float
      type: object
    DocumentItem:
      description: 'Class DocumentItemView'
      properties:
        date:
          $ref: '#/components/schemas/Date'
        name:
          $ref: '#/components/schemas/Name'
        header:
          $ref: '#/components/schemas/Header'
        type:
          description: 'Тип документа'
          type: string
          example: pdf
        size:
          description: 'Размер документа'
          type: string
          example: '123 Кб'
        url:
          type: string
          format: uri
      type: object
    FlatCardFloor:
      description: 'Class FlatCardFloorView'
      properties:
        number:
          $ref: '#/components/schemas/Number'
        plan:
          $ref: '#/components/schemas/Image'
        flats:
          description: 'Краткое описание квартир для формирования ссылок на мини плане этажа'
          type: array
          items:
            properties:
              number:
                $ref: '#/components/schemas/Number'
              status:
                description: 'Статус квартиры'
                type: string
                enum:
                  - free
                  - sold
                  - reserved
                  - closed
            type: object
      type: object
    FlatCard:
      description: 'Class FlatCardView'
      properties:
        floors:
          description: Этажи
          type: array
          items:
            $ref: '#/components/schemas/FlatCardFloor'
        id:
          $ref: '#/components/schemas/Id'
        number:
          $ref: '#/components/schemas/Number'
        floor:
          $ref: '#/components/schemas/Number'
        totalFloors:
          $ref: '#/components/schemas/Number'
        rooms:
          type: string
          enum:
            - s
            - '1'
            - '2'
            - '3'
        area:
          description: 'Общая площадь'
          type: number
          format: float
          example: 45.7
        areaKitchen:
          description: 'Площадь кухни'
          type: number
          format: float
          example: 15.7
        areaRooms:
          description: 'Площадь кухни'
          type: number
          format: float
          example: 30
        price:
          type: number
          format: integer
          example: 5000000
        priceFinish:
          type: number
          format: integer
          example: 5000000
        priceAction:
          type: number
          format: integer
          example: 5000000
        priceActionText:
          type: string
          example: 'Текст акции'
        plan:
          $ref: '#/components/schemas/Image'
        plan3d:
          $ref: '#/components/schemas/Image'
        planUrl:
          $ref: '#/components/schemas/URI'
        status:
          description: 'Статус квартиры'
          type: string
          enum:
            - free
            - sold
            - reserved
            - closed
        pdf:
          $ref: '#/components/schemas/URI'
      type: object
    FlatFloorFlat:
      description: 'Class FlatFloorFlatView'
      properties:
        id:
          $ref: '#/components/schemas/Id'
        number:
          $ref: '#/components/schemas/Number'
        rooms:
          type: string
          enum:
            - s
            - '1'
            - '2'
            - '3'
        area:
          type: number
          format: float
          example: 45.7
        price:
          type: number
          format: integer
          example: 5000000
        priceAction:
          type: number
          format: integer
          example: 5000000
        priceActionText:
          type: string
          example: 'Текст акции'
        status:
          type: string
          enum:
            - free
            - sold
            - reserved
            - closed
      type: object
    FlatFloor:
      description: 'Class FlatFloorView'
      properties:
        plan:
          $ref: '#/components/schemas/Image'
        floors:
          type: array
          items:
            $ref: '#/components/schemas/FlatVisualFloor'
        flats:
          type: array
          items:
            $ref: '#/components/schemas/FlatFloorFlat'
      type: object
    FlatListItem:
      description: 'Class FlatListItemView'
      properties:
        id:
          $ref: '#/components/schemas/Id'
        number:
          $ref: '#/components/schemas/Number'
        rooms:
          type: string
          enum:
            - s
            - '1'
            - '2'
            - '3'
        status:
          type: string
          enum:
            - free
            - reserved
            - sold
            - closed
        area:
          type: number
          format: float
          example: 45.7
        floor:
          type: number
          format: integer
          example: 5
        price:
          type: number
          format: integer
          example: 5000000
        priceFinish:
          type: number
          format: integer
          example: 5000000
        priceAction:
          type: number
          format: integer
          example: 5000000
        priceActionText:
          type: string
          example: 'Текст акции'
        plan:
          $ref: '#/components/schemas/Image'
      type: object
    FlatList:
      description: 'Class FlatListView'
      properties:
        sortField:
          description: 'Поле сортировки текущего списка'
          type: string
          enum:
            - rooms
            - area
            - floor
            - price
          example: price
        sortOrder:
          description: 'Порядок сортировки текущего списка'
          type: string
          enum:
            - asc
            - desc
          example: asc
        flats:
          description: 'Список квартир'
          type: array
          items:
            $ref: '#/components/schemas/FlatListItem'
        totalFloors:
          description: 'Максимально доступный этаж'
          type: number
          format: integer
          example: 9
      type: object
    FlatParameters:
      description: 'Class FlatParametersView'
      properties:
        rooms:
          description: Комнатность
          type: array
          items:
            type: string
            enum:
              - s
              - 1
              - 2
              - 3
        priceMin:
          description: 'Минимально доступная цена'
          type: number
          format: integer
          example: 2000000
        priceMax:
          description: 'Максимально доступная цена'
          type: number
          format: integer
          example: 10000000
        areaMin:
          description: 'Минимально доступная площадь'
          type: number
          format: float
          example: 35.8
        areaMax:
          description: 'Максимально доступная площадь'
          type: number
          format: float
          example: 75.4
        floorMin:
          description: 'Минимально доступный этаж'
          type: number
          format: integer
          example: 2
        floorMax:
          description: 'Максимально доступный этаж'
          type: number
          format: integer
          example: 9
        statuses:
          description: 'Статусы квартир'
          type: array
          items:
            type: string
            enum:
              - free
              - reserved
              - sold
      type: object
    FlatVisualFloorFlat:
      description: 'Class FlatVisualFloorFlatView'
      properties:
        type:
          description: 'Тип квартиры по комнатности'
          type: string
          enum:
            - s
            - 1
            - 2
            - 3
          example: s
        quantity:
          description: 'Количество квартир указанного типа на этаже'
          type: number
          format: integer
          example: 2
        minPrice:
          description: 'Минимальная цена квартиры указанного типа на этаже'
          type: number
          format: integer
      type: object
    FlatVisualFloor:
      description: 'Class FlatVisualFloorView'
      properties:
        number:
          $ref: '#/components/schemas/Number'
        inSales:
          description: 'Количество квартир в продаже'
          type: number
          format: integer
          example: 2
        flats:
          type: array
          items:
            $ref: '#/components/schemas/FlatVisualFloorFlat'
      type: object
    FlatVisual:
      description: 'Class FlatVisualView'
      properties:
        floors:
          type: array
          items:
            $ref: '#/components/schemas/FlatVisualFloor'
      type: object
    HowToGetItem:
      description: 'Class HowToGetItemView'
      properties:
        icon:
          $ref: '#/components/schemas/Image'
        header:
          $ref: '#/components/schemas/Header'
        text:
          $ref: '#/components/schemas/Text'
        note:
          $ref: '#/components/schemas/Text'
      type: object
    Link:
      description: 'Ссылка на внешний\внутренний ресурс'
      properties:
        data:
          properties:
            type:
              description: 'Тип страницы'
              type: string
              enum:
                - url
                - file
                - page
                - flats_visual
                - flats_parameter
                - livebroadcast
                - news
              example: url
            path:
              description: 'Компоненты url'
              type: array
              items:
                type: string
                example: index
          type: object
        popup:
          description: 'всплывающее окно'
          type: boolean
        text:
          $ref: '#/components/schemas/Text'
      type: object
    LiveBroadcast:
      description: 'Class LiveBroadcastView'
      properties:
        type:
          description: 'Ссылка на трансляцию'
          type: string
          enum:
            - m3u
            - iframe
        url:
          $ref: '#/components/schemas/URI'
      type: object
    Map:
      description: 'Class MapView'
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        scale:
          type: integer
      type: object
    MenuItem:
      description: 'Class MenuItemView'
      properties:
        header:
          $ref: '#/components/schemas/Header'
        link:
          $ref: '#/components/schemas/Link'
      type: object
    Menu:
      description: 'Class MenuView'
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        socialNetwork:
          type: array
          items:
            $ref: '#/components/schemas/SocialNetwork'
      type: object
    Metatag:
      description: Метатеги
      properties:
        title:
          type: string
          example: Контакты
          nullable: true
        keywords:
          type: string
          example: 'адрес телефон email'
          nullable: true
        description:
          type: string
          example: 'Адрес и телефон компании'
          nullable: true
      type: object
    MortgageCalculator:
      description: 'Class MortgageCalculator'
      properties:
        priceMin:
          type: integer
        priceMax:
          type: integer
        defaultPrice:
          type: integer
        paymentMin:
          type: integer
        paymentMax:
          type: integer
        defaultPayment:
          type: integer
        yearsMin:
          type: integer
        yearsMax:
          type: integer
        defaultYear:
          type: integer
        rateMin:
          type: integer
        rateMax:
          type: integer
        defaultRate:
          type: integer
      type: object
    NewsListItem:
      description: 'Class NewsListView'
      properties:
        id:
          $ref: '#/components/schemas/Id'
        header:
          $ref: '#/components/schemas/Header'
        date:
          $ref: '#/components/schemas/Date'
        path:
          $ref: '#/components/schemas/Path'
        description:
          $ref: '#/components/schemas/Description'
      type: object
    NewsList:
      description: 'Class NewsListView'
      properties:
        before:
          type: array
          items:
            $ref: '#/components/schemas/NewsListItem'
        after:
          type: array
          items:
            $ref: '#/components/schemas/NewsListItem'
      type: object
    NewsSingle:
      description: 'Class NewsSingleView'
      properties:
        id:
          $ref: '#/components/schemas/Id'
        header:
          $ref: '#/components/schemas/Header'
        date:
          $ref: '#/components/schemas/Date'
        path:
          $ref: '#/components/schemas/Path'
        description:
          $ref: '#/components/schemas/Description'
        text:
          $ref: '#/components/schemas/Text'
        image:
          $ref: '#/components/schemas/Image'
        list:
          type: array
          items:
            $ref: '#/components/schemas/NewsListItem'
      type: object
    Notification:
      description: 'Class NotificationView'
      properties:
        header:
          $ref: '#/components/schemas/Header'
        text:
          $ref: '#/components/schemas/Text'
        image:
          $ref: '#/components/schemas/Image'
        buttonText:
          $ref: '#/components/schemas/Header'
        buttonUrl:
          $ref: '#/components/schemas/URI'
      type: object
    PageBuildingProgressMonth:
      description: 'Class PageBuildingProgressMonthView'
      properties:
        month:
          $ref: '#/components/schemas/Number'
        description:
          $ref: '#/components/schemas/Description'
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
      type: object
    PageBuildingProgress:
      description: 'Class PageBuildingProgressView'
      properties:
        liveBroadcast:
          $ref: '#/components/schemas/LiveBroadcast'
        years:
          type: array
          items:
            $ref: '#/components/schemas/PageBuildingProgressYear'
      type: object
    PageBuildingProgressYear:
      description: 'Class PageBuildingProgressItemView'
      properties:
        number:
          $ref: '#/components/schemas/Number'
        months:
          type: array
          items:
            $ref: '#/components/schemas/PageBuildingProgressMonth'
      type: object
    PageCommerceRoomsItem:
      description: 'Class PageCommerceRoomsItemView'
      properties:
        image:
          $ref: '#/components/schemas/Image'
        price:
          $ref: '#/components/schemas/Price'
        floor:
          description: 'Этаж квартиры'
          type: number
          format: integer
          example: 3
        floors:
          description: 'Этажность здания'
          type: number
          format: integer
          example: 9
        area:
          description: 'Площадь квартиры'
          type: number
          format: float
          example: 56.36
        number:
          description: 'Номер квартиры'
          type: number
          format: integer
          example: 32
      type: object
    PageCommerce:
      description: 'Class PageCommerceView'
      properties:
        header:
          $ref: '#/components/schemas/Header'
        leftHeader:
          $ref: '#/components/schemas/Header'
        leftImage:
          $ref: '#/components/schemas/Image'
        rightHeader:
          $ref: '#/components/schemas/Header'
        rightImage:
          $ref: '#/components/schemas/Image'
        promoHeader:
